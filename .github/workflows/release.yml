name: Release
on:
  release:
    types: [published]

jobs:
  bump-tap:
    name: Update modib/homebrew-forge
    runs-on: ubuntu-latest
    steps:
      - name: Compute tarball SHA256
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "TAG=$TAG" >> $GITHUB_ENV
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/$TAG.tar.gz" \
            -o /tmp/source.tar.gz
          SHA=$(sha256sum /tmp/source.tar.gz | cut -d' ' -f1)
          echo "SHA256=$SHA" >> $GITHUB_ENV

      - name: Clone homebrew-forge tap
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/modib/homebrew-forge.git
          cd homebrew-forge

      - name: Update formula
        run: |
          cd homebrew-forge
          VERSION=${TAG#v}
          sed -i "s/version \".*\"/version \"$VERSION\"/" Formula/ws-cli.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" Formula/ws-cli.rb

      - name: Commit and push
        run: |
          cd homebrew-forge
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Formula/ws-cli.rb
          git commit -m "ws-cli: bump to $TAG"
          git push
